type: collection.insomnia.rest/5.0
name: pf-backend-community

collection:
  - url: http://localhost:3001/topics
    name: Create Topic
    method: POST
    body:
      mimeType: application/json
      text: |-
        {
          "topic_name": "Study"
        }
    headers:
      - name: Content-Type
        value: application/json

  - url: http://localhost:3001/users
    name: Create User
    method: POST
    body:
      mimeType: application/json
      text: |-
        {
          "username": "green",
          "password": "123456"
        }
    headers:
      - name: Content-Type
        value: application/json

  - url: http://localhost:3001/posts
    name: Create Post
    method: POST
    body:
      mimeType: application/json
      text: |-
        {
          "topic_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
          "author_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
          "title": "Need Calculus Book",
          "descriptions": "Looking for a second-hand Calculus book"
        }
    headers:
      - name: Content-Type
        value: application/json

  - url: http://localhost:3001/topics/all
    name: Get All Topics
    method: GET

  - url: http://localhost:3001/topics/{topic_id}
    name: Get Topic
    method: GET

  - url: http://localhost:3001/posts/{topic_id}
    name: Get Posts
    method: GET

  - url: http://localhost:3001/posts/{topic_id}/{post_id}
    name: Get Post
    method: GET

  - url: http://localhost:3001/users/{user_id}
    name: Get User
    method: GET

  - url: http://localhost:3001/posts/{topic_id}/{post_id}
    name: Update Post
    method: PUT
    body:
      mimeType: application/json
      text: |-
        {
          "topic_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
          "post_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
          "author_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
          "title": "Updated Title",
          "descriptions": "Updated Description",
          "edit_at": "2026-07-21"
        }
    headers:
      - name: Content-Type
        value: application/json

  - url: http://localhost:3001/topics/{topic_id}
    name: Delete Topic
    method: DELETE

  - url: http://localhost:3001/users/{user_id}
    name: Delete User
    method: DELETE

  - url: http://localhost:3001/posts/{topic_id}/{post_id}
    name: Delete Post
    method: DELETE