info:
  name: POST post
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/posts/{{topic_id}}"
  body:
    type: json
    data: |-
      {
        "title": "ห้องสมุด",
        "descriptions": "ช่วง Reading Week หอสมุดเปิดให้บริการตลอด 24 ชั่วโมง"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
